{% extends 'base.html' %}
{% block title %}Login — Biz-Analyst{% endblock %}
{% block head %}
<style>
  .auth-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
             padding:40px;width:100%;max-width:420px}
  .auth-logo{text-align:center;margin-bottom:28px}
  .auth-logo .big{font-size:26px;font-weight:800;
                  background:linear-gradient(135deg,var(--accent),var(--accent2));
                  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .auth-logo p{color:var(--subtext);font-size:14px;margin-top:6px}
  .auth-footer{text-align:center;margin-top:22px;font-size:13px;color:var(--subtext)}
  .auth-footer a{color:var(--accent);text-decoration:none;font-weight:600}
  .auth-footer a:hover{text-decoration:underline}
  .divider{height:1px;background:var(--border);margin:20px 0}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="big">Biz-Analyst</div>
      <p>Sign in to your account</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:6px">
        Login →
      </button>
    </form>
    <div class="divider"></div>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
