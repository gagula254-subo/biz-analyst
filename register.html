{% extends 'base.html' %}
{% block title %}Register — Biz-Analyst{% endblock %}
{% block head %}
<style>
  .auth-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
             padding:40px;width:100%;max-width:440px}
  .auth-logo{text-align:center;margin-bottom:28px}
  .auth-logo .big{font-size:26px;font-weight:800;
                  background:linear-gradient(135deg,var(--accent),var(--accent2));
                  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .auth-logo p{color:var(--subtext);font-size:14px;margin-top:6px}
  .auth-footer{text-align:center;margin-top:22px;font-size:13px;color:var(--subtext)}
  .auth-footer a{color:var(--accent);text-decoration:none;font-weight:600}
  .first-note{background:rgba(166,227,161,.1);border:1px solid rgba(166,227,161,.3);
              border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);
              margin-bottom:18px;text-align:center}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="big">Biz-Analyst</div>
      <p>Create your free account</p>
    </div>
    {% if not users_exist %}
    <div class="first-note">🛡️ First account created becomes Admin</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="Choose a username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" name="confirm" placeholder="Repeat password" required autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:6px">
        Create Account →
      </button>
    </form>
    <div class="auth-footer" style="margin-top:18px">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</div>
{% endblock %}
